<!DOCTYPE html>
<html>
<head>
<title>Checkout</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>

<body class="bg-gray-100">

<!-- NAV -->
<div class="bg-white shadow p-4 flex justify-between">
<h1 class="font-bold text-xl">Checkout</h1>

<a href="{% url 'cart' %}">
<i class="fas fa-arrow-left"></i>
</a>
</div>


<div class="max-w-5xl mx-auto mt-8 grid md:grid-cols-2 gap-8">

<!-- ADDRESS FORM -->
<div class="bg-white p-6 rounded-lg shadow">

<h2 class="text-xl font-bold mb-4">
Shipping Address
</h2>

<form method="POST">
{% csrf_token %}

<div class="mb-3">
<label>Full Name</label>
<input type="text" name="full_name"
class="w-full border p-3 rounded">
</div>

<div class="mb-3">
<label>Phone</label>
<input type="text" name="phone"
class="w-full border p-3 rounded">
</div>

<div class="mb-3">
<label>Address</label>
<input type="text" name="address"
class="w-full border p-3 rounded">
</div>

<div class="grid grid-cols-2 gap-3">

<div>
<label>City</label>
<input type="text" name="city"
class="w-full border p-3 rounded">
</div>

<div>
<label>State</label>
<input type="text" name="state"
class="w-full border p-3 rounded">
</div>

</div>

<div class="mt-3">
<label>Country</label>
<input type="text" name="country"
value="Nigeria"
class="w-full border p-3 rounded">
</div>

<button class="mt-6 w-full bg-indigo-600 text-white py-3 rounded">
Place Order
</button>

</form>

</div>


<!-- ORDER SUMMARY -->
<div class="bg-white p-6 rounded-lg shadow">

<h2 class="text-xl font-bold mb-4">
Order Summary
</h2>

{% for item in items %}
<div class="flex justify-between mb-3">
<span>{{ item.product.name }} x{{ item.quantity }}</span>
<span>₦{{ item.product.price }}</span>
</div>
{% endfor %}

<hr class="my-4">

<div class="flex justify-between font-bold text-lg">
<span>Total</span>
<span>₦{{ total }}</span>
</div>

</div>

</div>

</body>
</html>
