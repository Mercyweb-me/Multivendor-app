<!DOCTYPE html>
<html>
<head>
<title>Post Product</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>

<body class="bg-gray-100">

<div class="bg-white shadow p-4 flex justify-between">
<h1 class="font-bold">Post Product</h1>

<a href="{% url 'dashboard' %}">
<i class="fas fa-arrow-left"></i>
</a>
</div>


<div class="max-w-2xl mx-auto mt-10 bg-white p-8 shadow rounded-lg">

<h2 class="text-2xl font-bold mb-6">
Upload New Product
</h2>

<form method="POST" enctype="multipart/form-data">
{% csrf_token %}

<div class="mb-4">
<label>Product Name</label>
<input type="text" name="name"
class="w-full border p-3 rounded">
</div>

<div class="mb-4">
<label>Description</label>
<textarea name="description"
class="w-full border p-3 rounded"></textarea>
</div>

<div class="mb-4">
<label>Category</label>
<select name="category"
class="w-full border p-3 rounded">
{% for c in categories %}
<option value="{{ c.id }}">{{ c.name }}</option>
{% endfor %}
</select>
</div>

<div class="grid grid-cols-2 gap-4">

<div>
<label>Price</label>
<input type="number" name="price"
class="w-full border p-3 rounded">
</div>

<div>
<label>Stock</label>
<input type="number" name="stock"
class="w-full border p-3 rounded">
</div>

</div>

<div class="mt-4">
<label>Product Image</label>
<input type="file" name="image"
class="w-full border p-3 rounded">
</div>

<button class="mt-6 w-full bg-indigo-600 text-white py-3 rounded">
Post Product
</button>

</form>

</div>

</body>
</html>
