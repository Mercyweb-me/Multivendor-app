<!DOCTYPE html>
<html>
<head>
<title>Notifications</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>

<body class="bg-gray-100">

<div class="bg-white shadow p-4 flex justify-between">

<h1 class="font-bold text-xl">
Notifications
</h1>

<a href="{% url 'dashboard' %}">
<i class="fas fa-arrow-left"></i>
</a>

</div>


<div class="max-w-4xl mx-auto mt-8">

{% for n in notifications %}

<div class="bg-white p-4 rounded-lg shadow mb-3 flex justify-between
{% if not n.is_read %}border-l-4 border-indigo-600{% endif %}">

<div>

<h3 class="font-bold">
{{ n.title }}
</h3>

<p class="text-gray-600">
{{ n.message }}
</p>

<p class="text-xs text-gray-400">
{{ n.created_at }}
</p>

</div>

{% if not n.is_read %}
<a href="/notification-read/{{ n.id }}"
class="text-indigo-600">
Mark read
</a>
{% endif %}

</div>

{% empty %}

<div class="bg-white p-10 text-center rounded shadow">
<i class="fas fa-bell text-4xl text-gray-300"></i>
<p class="text-gray-500 mt-4">
No notifications
</p>
</div>

{% endfor %}

</div>

</body>
</html>
