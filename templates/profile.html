<!DOCTYPE html>
<html>
<head>
<title>Profile</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>

<body class="bg-gray-100">

<!-- HEADER -->
<div class="bg-white shadow p-4 flex justify-between items-center">

<div class="flex items-center space-x-3">
<a href="{% url 'dashboard' %}">
<i class="fas fa-arrow-left text-xl"></i>
</a>

<h1 class="font-bold text-xl">Profile</h1>
</div>

<a href="{% url 'settings' %}">
<i class="fas fa-cog text-xl text-gray-600"></i>
</a>

</div>


<div class="max-w-4xl mx-auto mt-8">

<div class="bg-white p-6 rounded-lg shadow text-center">

<div class="w-24 h-24 bg-indigo-600 text-white 
rounded-full flex items-center justify-center 
mx-auto text-3xl font-bold">

{{ request.user.username|first|upper }}

</div>

<h2 class="mt-3 font-bold text-lg">
{{ request.user.username }}
</h2>

<p class="text-gray-500">
{{ request.user.email }}
</p>

<p class="mt-2">
Role: <span class="font-semibold">
{{ request.user.role|title }}
</span>
</p>

</div>

</div>

</body>
</html>
