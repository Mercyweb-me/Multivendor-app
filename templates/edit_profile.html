<!DOCTYPE html>
<html>
<head>
<title>Edit Profile</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>

<body class="bg-gray-100">

<!-- HEADER -->
<div class="bg-white shadow p-4 flex justify-between items-center">

<div class="flex items-center space-x-3">
<a href="{% url 'profile' %}">
<i class="fas fa-arrow-left text-xl"></i>
</a>

<h1 class="font-bold text-xl">Edit Profile</h1>
</div>

</div>


<div class="max-w-2xl mx-auto mt-8">

<!-- EDIT PROFILE SECTION -->
<div class="bg-white p-6 rounded-lg shadow">

<!-- PROFILE PICTURE SECTION -->
<div class="text-center mb-8">

<div class="w-24 h-24 bg-indigo-600 text-white 
rounded-full flex items-center justify-center 
mx-auto text-3xl font-bold mb-4">

{{ request.user.username|first|upper }}

</div>

<label for="profile_picture" 
class="inline-block px-4 py-2 bg-indigo-600 text-white 
rounded-lg hover:bg-indigo-700 cursor-pointer text-sm">
<i class="fas fa-camera mr-2"></i> Change Picture
</label>

<input type="file" id="profile_picture" class="hidden" accept="image/*">

</div>


<!-- EDIT FORM -->
<form method="POST" enctype="multipart/form-data" class="space-y-6">

{% csrf_token %}

<!-- USERNAME -->
<div>
<label class="block text-sm font-medium text-gray-700 mb-2">
Username
</label>
<input type="text" name="username" 
value="{{ request.user.username }}"
class="w-full px-4 py-2 border border-gray-300 
rounded-lg focus:ring-2 focus:ring-indigo-600 
focus:border-transparent outline-none">
</div>


<!-- EMAIL -->
<div>
<label class="block text-sm font-medium text-gray-700 mb-2">
Email Address
</label>
<input type="email" name="email" 
value="{{ request.user.email }}"
class="w-full px-4 py-2 border border-gray-300 
rounded-lg focus:ring-2 focus:ring-indigo-600 
focus:border-transparent outline-none">
</div>


<!-- FIRST NAME -->
<div>
<label class="block text-sm font-medium text-gray-700 mb-2">
First Name
</label>
<input type="text" name="first_name" 
value="{{ request.user.first_name }}"
class="w-full px-4 py-2 border border-gray-300 
rounded-lg focus:ring-2 focus:ring-indigo-600 
focus:border-transparent outline-none">
</div>


<!-- LAST NAME -->
<div>
<label class="block text-sm font-medium text-gray-700 mb-2">
Last Name
</label>
<input type="text" name="last_name" 
value="{{ request.user.last_name }}"
class="w-full px-4 py-2 border border-gray-300 
rounded-lg focus:ring-2 focus:ring-indigo-600 
focus:border-transparent outline-none">
</div>


<!-- BIO -->
<div>
<label class="block text-sm font-medium text-gray-700 mb-2">
Bio
</label>
<textarea name="bio" rows="4"
class="w-full px-4 py-2 border border-gray-300 
rounded-lg focus:ring-2 focus:ring-indigo-600 
focus:border-transparent outline-none"
placeholder="Tell us about yourself...">{{ user_profile.bio }}</textarea>
</div>


<!-- PHONE NUMBER -->
<div>
<label class="block text-sm font-medium text-gray-700 mb-2">
Phone Number
</label>
<input type="tel" name="phone" 
value="{{ user_profile.phone }}"
class="w-full px-4 py-2 border border-gray-300 
rounded-lg focus:ring-2 focus:ring-indigo-600 
focus:border-transparent outline-none">
</div>


<!-- ADDRESS -->
<div>
<label class="block text-sm font-medium text-gray-700 mb-2">
Address
</label>
<input type="text" name="address" 
value="{{ user_profile.address }}"
class="w-full px-4 py-2 border border-gray-300 
rounded-lg focus:ring-2 focus:ring-indigo-600 
focus:border-transparent outline-none">
</div>


<!-- CITY -->
<div class="grid grid-cols-2 gap-4">

<div>
<label class="block text-sm font-medium text-gray-700 mb-2">
City
</label>
<input type="text" name="city" 
value="{{ user_profile.city }}"
class="w-full px-4 py-2 border border-gray-300 
rounded-lg focus:ring-2 focus:ring-indigo-600 
focus:border-transparent outline-none">
</div>

<!-- ZIP CODE -->
<div>
<label class="block text-sm font-medium text-gray-700 mb-2">
Zip Code
</label>
<input type="text" name="zip_code" 
value="{{ user_profile.zip_code }}"
class="w-full px-4 py-2 border border-gray-300 
rounded-lg focus:ring-2 focus:ring-indigo-600 
focus:border-transparent outline-none">
</div>

</div>


<!-- COUNTRY -->
<div>
<label class="block text-sm font-medium text-gray-700 mb-2">
Country
</label>
<input type="text" name="country" 
value="{{ user_profile.country }}"
class="w-full px-4 py-2 border border-gray-300 
rounded-lg focus:ring-2 focus:ring-indigo-600 
focus:border-transparent outline-none">
</div>


<!-- ACTION BUTTONS -->
<div class="flex gap-4 pt-4 border-t border-gray-200">

<button type="submit" 
class="flex-1 px-4 py-2 bg-indigo-600 text-white 
rounded-lg hover:bg-indigo-700 font-medium">
<i class="fas fa-save mr-2"></i> Save Changes
</button>

<a href="{% url 'profile' %}" 
class="flex-1 px-4 py-2 bg-gray-300 text-gray-800 
rounded-lg hover:bg-gray-400 font-medium text-center">
<i class="fas fa-times mr-2"></i> Cancel
</a>

</div>

</form>

</div>


<!-- CHANGE EMAIL SECTION -->
<div class="bg-white p-6 rounded-lg shadow mt-6">

<h3 class="font-bold text-lg mb-4">
<i class="fas fa-envelope mr-2"></i> Change Email
</h3>

<form method="POST" action="{% url 'change_email' %}" class="space-y-4">

{% csrf_token %}

<!-- CURRENT EMAIL -->
<div>
<label class="block text-sm font-medium text-gray-700 mb-2">
Current Email
</label>
<input type="email" value="{{ request.user.email }}" disabled
class="w-full px-4 py-2 border border-gray-300 
rounded-lg bg-gray-100 text-gray-600 outline-none">
</div>

<!-- NEW EMAIL -->
<div>
<label class="block text-sm font-medium text-gray-700 mb-2">
New Email Address
</label>
<input type="email" name="new_email" required
class="w-full px-4 py-2 border border-gray-300 
rounded-lg focus:ring-2 focus:ring-indigo-600 
focus:border-transparent outline-none"
placeholder="Enter your new email">
</div>

<!-- PASSWORD CONFIRMATION -->
<div>
<label class="block text-sm font-medium text-gray-700 mb-2">
Password (to confirm)
</label>
<input type="password" name="password" required
class="w-full px-4 py-2 border border-gray-300 
rounded-lg focus:ring-2 focus:ring-indigo-600 
focus:border-transparent outline-none"
placeholder="Enter your password">
</div>

<!-- ACTION BUTTONS -->
<div class="flex gap-4 pt-4 border-t border-gray-200">

<button type="submit" 
class="flex-1 px-4 py-2 bg-indigo-600 text-white 
rounded-lg hover:bg-indigo-700 font-medium">
<i class="fas fa-check mr-2"></i> Change Email
</button>

<button type="reset" 
class="flex-1 px-4 py-2 bg-gray-300 text-gray-800 
rounded-lg hover:bg-gray-400 font-medium">
<i class="fas fa-times mr-2"></i> Cancel
</button>

</div>

</form>

</div>


<!-- CHANGE PASSWORD SECTION -->
<div class="bg-white p-6 rounded-lg shadow mt-6 mb-8">

<h3 class="font-bold text-lg mb-4">
<i class="fas fa-lock mr-2"></i> Change Password
</h3>

<form method="POST" action="{% url 'change_password' %}" class="space-y-4">

{% csrf_token %}

<!-- CURRENT PASSWORD -->
<div>
<label class="block text-sm font-medium text-gray-700 mb-2">
Current Password
</label>
<input type="password" name="current_password" required
class="w-full px-4 py-2 border border-gray-300 
rounded-lg focus:ring-2 focus:ring-indigo-600 
focus:border-transparent outline-none"
placeholder="Enter your current password">
</div>

<!-- NEW PASSWORD -->
<div>
<label class="block text-sm font-medium text-gray-700 mb-2">
New Password
</label>
<input type="password" name="new_password" required
class="w-full px-4 py-2 border border-gray-300 
rounded-lg focus:ring-2 focus:ring-indigo-600 
focus:border-transparent outline-none"
placeholder="Enter your new password">
<p class="text-xs text-gray-500 mt-1">
Must be at least 8 characters long
</p>
</div>

<!-- CONFIRM PASSWORD -->
<div>
<label class="block text-sm font-medium text-gray-700 mb-2">
Confirm New Password
</label>
<input type="password" name="confirm_password" required
class="w-full px-4 py-2 border border-gray-300 
rounded-lg focus:ring-2 focus:ring-indigo-600 
focus:border-transparent outline-none"
placeholder="Confirm your new password">
</div>

<!-- ACTION BUTTONS -->
<div class="flex gap-4 pt-4 border-t border-gray-200">

<button type="submit" 
class="flex-1 px-4 py-2 bg-indigo-600 text-white 
rounded-lg hover:bg-indigo-700 font-medium">
<i class="fas fa-check mr-2"></i> Update Password
</button>

<button type="reset" 
class="flex-1 px-4 py-2 bg-gray-300 text-gray-800 
rounded-lg hover:bg-gray-400 font-medium">
<i class="fas fa-times mr-2"></i> Cancel
</button>

</div>

</form>

</div>

</div>

<script>
// Handle profile picture preview
document.getElementById('profile_picture').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (file) {
        const reader = new FileReader();
        reader.onload = function(event) {
            // You can add image preview logic here
            console.log('Image selected:', file.name);
        };
        reader.readAsDataURL(file);
    }
});
</script>

</body>
</html>
