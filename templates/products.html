<!DOCTYPE html>
<html>
<head>
<title>Marketplace</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>

<body class="bg-gray-100">

<!-- TOP NAV -->
<div class="bg-white shadow p-4 flex justify-between items-center">

<div class="flex items-center space-x-3">
<a href="{% url 'dashboard' %}" class="text-gray-600 hover:text-indigo-600">
<i class="fas fa-arrow-left text-xl"></i>
</a>

<h1 class="font-bold text-xl">Marketplace</h1>
</div>

<form method="GET" class="flex items-center space-x-2">
<input type="text" name="search" placeholder="Search products..."
value="{{ request.GET.search }}"
class="border rounded-lg px-3 py-2 focus:outline-none">

<button class="bg-indigo-600 text-white px-4 py-2 rounded-lg">
<i class="fas fa-search"></i>
</button>
</form>

</div>


<div class="max-w-7xl mx-auto mt-6 flex gap-6">

<!-- CATEGORY SIDEBAR -->
<div class="w-1/4 bg-white p-4 rounded-lg shadow h-fit">

<h2 class="font-bold mb-3">
<i class="fas fa-list"></i> Categories
</h2>

<a href="{% url 'products' %}"
class="block py-2 text-gray-600 hover:text-indigo-600">
All
</a>

{% for c in categories %}
<a href="?category={{ c.id }}"
class="block py-2 text-gray-600 hover:text-indigo-600">
{{ c.name }}
</a>
{% endfor %}

</div>


<!-- PRODUCTS GRID -->
<div class="w-3/4">

<div class="grid grid-cols-1 md:grid-cols-3 gap-6">

{% for p in products %}
<div class="bg-white rounded-xl shadow hover:shadow-lg transition overflow-hidden">

    <td class="p-3">
        {% if p.image %}
            <img src="{{ p.image.url }}" class="h-12 w-12 rounded object-cover">
        {% else %}
            <div class="h-12 w-12 bg-gray-200 rounded"></div>
        {% endif %}
    </td>
<div class="p-4">

<h2 class="font-bold text-lg">
{{ p.name }}
</h2>

<p class="text-gray-500 text-sm mt-1">
{{ p.description|truncatewords:10 }}
</p>

<div class="flex justify-between items-center mt-3">

    <td class="p-3 text-green-600 font-semibold">
        ₦{{ p.price|floatformat:2 }}
    </td>

<a href="{% url 'add_to_cart' p.id %}"
class="bg-indigo-600 text-white p-2 rounded-lg hover:bg-indigo-700">
<i class="fas fa-cart-plus"></i>
</a>

</div>

</div>

</div>
{% endfor %}

</div>

{% if not products %}
<div class="bg-white p-10 text-center rounded-lg shadow">
<i class="fas fa-box-open text-4xl text-gray-300"></i>
<p class="text-gray-500 mt-3">
No products found
</p>
</div>
{% endif %}

</div>

</div>

</body>
</html>
