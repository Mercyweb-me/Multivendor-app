<!DOCTYPE html>
<html>
<head>
<title>Order History</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>

<body class="bg-gray-100">

<!-- NAV -->
<div class="bg-white shadow p-4 flex justify-between">
<h1 class="font-bold text-xl">
<i class="fas fa-box"></i> Order History
</h1>

<a href="{% url 'dashboard' %}">
<i class="fas fa-arrow-left text-xl"></i>
</a>
</div>

<div class="max-w-5xl mx-auto mt-8">

{% for order in orders %}

<div class="bg-white p-5 rounded-lg shadow mb-4">

<div class="flex justify-between items-center">

<div>
<h2 class="font-bold">
Order #{{ order.id }}
</h2>

<p class="text-sm text-gray-500">
{{ order.created_at }}
</p>
</div>

<div>
<span class="px-3 py-1 rounded text-white
{% if order.status == 'pending' %}bg-yellow-500
{% elif order.status == 'paid' %}bg-blue-500
{% elif order.status == 'shipping' %}bg-purple-500
{% elif order.status == 'delivered' %}bg-green-500
{% else %}bg-red-500
{% endif %}
">
{{ order.status }}
</span>
</div>

</div>

<div class="mt-3 text-gray-700">
Total: ₦{{ order.total_price }}
</div>

<a href="{% url 'order_detail' order.id %}"
class="text-indigo-600 text-sm mt-2 inline-block">
View Details →
</a>

</div>

{% empty %}

<div class="bg-white p-10 rounded shadow text-center">
<i class="fas fa-box-open text-4xl text-gray-300"></i>
<p class="text-gray-500 mt-3">
No orders yet
</p>
</div>

{% endfor %}

</div>

</body>
</html>
